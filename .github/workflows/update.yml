name: Atualizar Calendário Copa 2026

on:
  push:
    branches: [main]
  schedule:
    # Executa a cada 6 horas
    - cron: "0 */6 * * *"
  workflow_dispatch:
    # Permite execução manual pela interface do GitHub

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-calendar:
    name: Buscar jogos e gerar ICS
    runs-on: ubuntu-latest
    # Ignora commits automáticos do próprio workflow para evitar loop infinito
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Buscar fixtures da API
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python scripts/fetch_matches.py

      - name: Gerar worldcup.ics
        run: python scripts/build_calendar.py

      - name: Commitar dados atualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fixtures.json data/cache.json output/worldcup.ics
          git diff --cached --quiet || git commit -m "chore: atualiza calendário $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push

  deploy-pages:
    name: Publicar no GitHub Pages
    needs: update-calendar
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          # Garante que o commit gerado acima seja pego
          ref: main

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar artefato (pasta output/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
