name: Atualizar Calendário Copa 2026

on:
  push:
    branches: [main]
  schedule:
    # Executa a cada 6 horas
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-calendar:
    name: Buscar jogos e gerar ICS
    runs-on: ubuntu-latest
    # Ignora commits automáticos do próprio workflow para evitar loop infinito
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Gerar fixtures estáticos
        env:
          PYTHONPATH: .
        run: python -u scripts/build_static_fixtures.py

      - name: Gerar worldcup.ics
        env:
          PYTHONPATH: .
        run: python -u scripts/build_calendar.py

      - name: Commitar dados atualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fixtures.json data/cache.json output/worldcup.ics
          git diff --cached --quiet || git commit -m "chore: atualiza calendario $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
